    <button class="ad-button" onclick="showAdsgramAd()">មើលពាណិជ្ជកម្ម (Watch Ad)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const AdController = window.Adsgram.init({ blockId: "247" });

        function showAdsgramAd() {
            AdController.show().then((result) => {
                alert("អរគុណសម្រាប់ការទស្សនាពាណិជ្ជកម្ម!");

            });
        }
