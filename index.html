<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App Video Player</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #18181b);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.25rem;
            text-align: center;
        }

        .video-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .video-card {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .video-card h3 {
            margin: 0 0 8px 0;
            font-size: 1rem;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
        }

        .ad-button {
            width: 100%;
            max-width: 500px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .ad-button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h2>📺 បញ្ជីវីដេអូរបស់អ្នក (My Videos)</h2>

    <div class="video-container">
        <!-- Video 1 -->
        <div class="video-card">
            <h3>វីដេអូទី ១</h3>
            <video controls preload="metadata" poster="AQODH7uXOXs1u2oWIfP8qGrRedumYE4aWxL1.jpg">
                <source src="o4huDTeG4QjfxSIfGqiarbOvCjAdI3JLV1rIA.mp4" type="video/mp4">
                Browser របស់អ្នកមិនគាំទ្រការចាក់វីដេអូឡើយ។
            </video>
        </div>

        <!-- Video 2 -->
        <div class="video-card">
            <h3>វីដេអូទី ២</h3>
            <video controls preload="metadata" poster="AQPrkHGrE2_gSj9AKJ6EJ_emwujLpmgwzQuLQ.jpg">
                <source src="oQRx2ijCiEllwbqOqVfJLBIAIbnv0Bu3AQIWAm.mp4" type="video/mp4">
            </video>
        </div>

        <!-- Video 3 -->
        <div class="video-card">
            <h3>វីដេអូទី ៣</h3>
            <video controls preload="metadata">
                <source src="ocgyGUABKgwlKAPiZPzaiFnEcG8aYZCqhBEx.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Adsgram Trigger Button -->
    <button class="ad-button" onclick="showAdsgramAd()">មើលពាណិជ្ជកម្ម (Watch Ad)</button>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // ពង្រីកអេក្រង់ពេញ Telegram

        // Initialize Adsgram with Test Block ID "247"
        const AdController = window.Adsgram.init({ blockId: "247" });

        function showAdsgramAd() {
            AdController.show().then((result) => {
                // អ្នកប្រើប្រាស់មើលពាណិជ្ជកម្មចប់
                alert("អរគុណសម្រាប់ការទស្សនាពាណិជ្ជកម្ម!");
            }).catch((result) => {
                // មានបញ្ហា ឬអ្នកប្រើប្រាស់ចុចរំលង (Skip)
                alert("ការទស្សនាពាណិជ្ជកម្មមិនទាន់បានបញ្ចប់ ឬគ្មាន Ads ត្រូវបង្ហាញឡើយ។");
            });
        }
    </script>
</body>
</html>
