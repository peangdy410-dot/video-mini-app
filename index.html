<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Mini App</title>
    <!-- 1. ភ្ជាប់ SDK របស់ Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        h2 { color: #0088cc; }
        .video-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        iframe, video {
            width: 100%;
            height: 210px;
            border-radius: 8px;
            border: none;
        }
        .video-title {
            font-size: 16px;
            margin-top: 10px;
            font-weight: bold;
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>📺 បញ្ជីវីដេអូភាគ</h2>

    <!-- វីដេអូទី ១ (ឧទាហរណ៍ប្រើ Link YouTube Embed) -->
    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        <div class="video-title">១. វីដេអូណែនាំដំបូង</div>
    </div>

    <!-- វីដេអូទី ២ (ឧទាហរណ៍ប្រើ Direct MP4 Link) -->
    <div class="video-card">
        <video controls poster="https://via.placeholder.com/400x225">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Broswer របស់អ្នកមិនទ្រទ្រង់ Video Tag ទេ។
        </video>
        <div class="video-title">២. របៀបប្រើប្រាស់ App</div>
    </div>

    <script>
        // ប្រាប់ Telegram ថា App រួចរាល់សម្រាប់បង្ហាញ
        const tg = window.Telegram.WebApp;
        tg.expand(); // ពង្រីក App ឱ្យពេញអេក្រង់ទូរស័ព្ទ
    </script>
</body>
</html>
